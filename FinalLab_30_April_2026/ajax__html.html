<!doctype html>
<html>
  <head>
    <title>Student Info Using AJAX</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f7fa;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .container {
        background: #ffffff;
        padding: 25px 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 350px;
        text-align: center;
      }

      h2 {
        margin-bottom: 20px;
        color: #333;
      }

      button {
        background: #4caf50;
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.3s;
      }

      button:hover {
        background: #45a049;
      }

      .student {
        text-align: left;
        margin-top: 15px;
        padding: 12px;
        border-radius: 8px;
        background: #f0f4f8;
        font-size: 14px;
      }

      .student strong {
        color: #333;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Student Info</h2>

      <button onclick="loadData()">Load Data</button>

      <div id="result"></div>
    </div>

    <script src="script_js.js"></script>
  </body>
</html>
